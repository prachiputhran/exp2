name: Inference Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  inference:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run inference script
        run: |
          echo "Running inference..."
